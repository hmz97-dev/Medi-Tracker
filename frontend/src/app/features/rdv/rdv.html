<div class="rdv-wrapper" style="padding:16px; max-width:1100px; margin:0 auto;">

  <h2>Rendez-vous</h2>

  <div *ngIf="uiMessage" style="margin:10px 0; color:#333;">
    {{ uiMessage }}
  </div>

  <!-- FORM -->
  <div style="border:1px solid #ddd; border-radius:12px; padding:16px; background:#fff; margin-bottom:16px;">
    <h3 style="margin:0 0 12px 0;">{{ selectedRdvId ? 'Modifier RDV' : 'Nouveau RDV' }}</h3>

    <div style="display:grid; gap:10px;">
      <label>Patient</label>
      <select [(ngModel)]="formModel.patientId">
        <option [ngValue]="null" disabled>Choisir patient</option>
        <option *ngFor="let p of patients" [ngValue]="p.id">
          {{ p.firstName }} {{ p.lastName }}
        </option>
      </select>

      <label>Médecin</label>
      <select [(ngModel)]="formModel.doctorId">
        <option [ngValue]="null" disabled>Choisir médecin</option>
        <option *ngFor="let d of doctors" [ngValue]="d.id">
          Dr {{ d.firstName }} {{ d.lastName }}
        </option>
      </select>

      <label>Début</label>
      <input type="datetime-local" [(ngModel)]="formModel.start" />

      <label>Fin</label>
      <input type="datetime-local" [(ngModel)]="formModel.end" />

      <label>Motif</label>
      <textarea rows="3" [(ngModel)]="formModel.reason" placeholder="Motif de consultation"></textarea>

      <div style="display:flex; gap:10px; margin-top:8px;">
        <button (click)="saveFromForm()" [disabled]="!canSubmitForm()">
          {{ selectedRdvId ? 'Mettre à jour' : 'Ajouter RDV' }}
        </button>
        <button type="button" (click)="resetForm()">Nouveau</button>
        <button type="button" (click)="deleteSelected()" [disabled]="!selectedRdvId">Supprimer</button>
      </div>

      <small style="opacity:0.8;">
        Clique sur un créneau pour pré-remplir. Clique sur un RDV pour modifier.
      </small>
    </div>
  </div>

  <!-- CALENDAR -->
  <full-calendar [options]="calendarOptions"></full-calendar>
</div>
